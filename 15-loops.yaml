- name: loops
  hosts: web
  become: yes
  tasks: 
  - name: loops
    ansible.builtin.package:
     name: "{{ item.name }}"
     state: "{{ item.state }}"
    loop:
    - { name: 'nginx', state: 'present'}
    - { name: 'mysql', state: 'absent'}
    - { name: 'httpd', state: 'present'}
    - { name: 'postfix', state: 'absent'}